version: '3.7'
services:
  redis:
    hostname: redis
    image: redis:6.0.9
    container_name: redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./conf/redis.conf:/etc/redis/redis.conf
      - /data/data/redis:/data/redis/data   # redis.conf中的dir路径也需保持一致
      - /data/logs/redis:/data/redis/logs
    ports:
      - "6379:6379"
    networks:
      - docker-network

networks:
  docker-network:
    name: docker-network # 网络名称
    driver: bridge
      