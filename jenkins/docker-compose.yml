version: '3.7'
services:
  jenkins:
    image: jenkins/jenkins:lts
    hostname: jenkins
    container_name: jenkins
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /home/data/jenkins_home:/var/jenkins_home
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - docker-network

networks:
  docker-network:
    name: docker-network
    driver: bridge
      
