version: '3.7'
services:
  mysql:
    hostname: mysql
    image: mysql:5.7
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci # 设置utf8字符集
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      # 集群节点都要存在此目录和配置文件
      - /home/data/mysql:/var/lib/mysql/data  # 数据目录
      - /home/docker/mysql/conf:/etc/mysql   # 配置文件目录
    ports:  
      - "3306:3306"
    networks:
      - overlay
    deploy:
      mode: replicated
      replicas: 3

networks:
  overlay:
      
      
