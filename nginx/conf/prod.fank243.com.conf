# 负载均衡
upstream app {
  server app:8901 weight=10; # 服务地址，weight代表权重，值越高代表负载到此台服务越多
  server app2:8901 weight=3;
}

# App
server {
  listen 80;
  listen 443 ssl http2;
  server_name api.class2dance.com;

  ssl_certificate conf.d/cert/api.class2dance.com/cert.pem;
  ssl_certificate_key conf.d/cert/api.class2dance.com/cert.key;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_timeout 10m;
  ssl_session_cache builtin:1000 shared:SSL:10m;
  ssl_buffer_size 1400;
  add_header Strict-Transport-Security max-age=15768000;
  ssl_stapling on;
  ssl_stapling_verify on;

  index index.html index.htm index.jsp;
 
  # 放行App接口 
  location /app {
    try_files $uri $uri/ @app;
  }

  # 放行阿里云OSS回调
  location /callback {
    try_files $uri $uri/ @app;
  }
  
  # 放行robots.txt
  location /robots.txt {
    try_files $uri $uri/ @app;
  }
 
  location @app {
    proxy_pass http://app;
    include conf.d/proxy.conf;
  }
 
  location / {
     return 444;
  } 

  #禁止Scrapy等工具的抓取
  if ($http_user_agent ~* (Scrapy|Curl|HttpClient)) {
      return 403;
  }
  #禁止指定UA及UA为空的访问
  if ($http_user_agent ~ "Baiduspider|WinHttp|WebZIP|FetchURL|node-superagent|java/|FeedDemon|Jullo|JikeSpider|Indy Library|Alexa Toolbar|AskTbFXTV|AhrefsBot|CrawlDaddy|Java|Feedly|Apache-HttpAsyncClient|UniversalFeedParser|ApacheBench|Microsoft URL Control|Swiftbot|ZmEu|oBot|jaunty|Python-urllib|lightDeckReports Bot|YYSpider|DigExt|HttpClient|MJ12bot|heritrix|EasouSpider|Ezooms|BOT/0.1|YandexBot|FlightDeckReports|Linguee Bot|^$" ) {
      return 403;             
  }
  #禁止非GET|HEAD|POST方式的抓取
  if ($request_method !~ ^(GET|HEAD|POST)$) {
      return 403;
  }

  # 独立日志   
  access_log /var/log/nginx/access_api.log;
  error_log  /var/log/nginx/error_api.log warn;
}
