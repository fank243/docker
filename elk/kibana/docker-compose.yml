version: '3.7'
services:
  kibana:
    hostname: kibana
    container_name: kibana
    image: kibana:7.6.1
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /data/data/elk/kibana:/usr/share/kibana/data    # 数据目录
      - ./conf:/usr/share/kibana/config    # 配置目录
    ports:
      - 5601:5601
    networks:
      - docker-network

networks:
  docker-network:
    name: docker-network
    driver: bridge

